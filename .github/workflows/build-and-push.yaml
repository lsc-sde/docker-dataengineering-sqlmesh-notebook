name: Build and Tag Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: temp-image
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract SQLMesh version
      id: sqlmesh-version
      run: |
        SQLMESH_VERSION=$(docker run --rm temp-image python -c "import sqlmesh; print(sqlmesh.__version__)")
        echo "version=${SQLMESH_VERSION}" >> $GITHUB_OUTPUT
        echo "SQLMesh version: ${SQLMESH_VERSION}"

    - name: Tag and push Docker image
      run: |
        # Tag the existing image with proper names
        docker tag temp-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker tag temp-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sqlmesh-${{ steps.sqlmesh-version.outputs.version }}
        
        # Push only if not a pull request
        if [ "${{ github.event_name }}" != "pull_request" ]; then
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sqlmesh-${{ steps.sqlmesh-version.outputs.version }}
        fi
